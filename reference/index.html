<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SLEEVE / ジャケ写メーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Archivo+Black&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #141417;
    --panel: #1a1a1e;
    --panel-hi: #222228;
    --line: #2a2a32;
    --text: #eaeaea;
    --text-dim: #888890;
    --accent: #ff4d2e;
    --accent-2: #ffd23f;
    --accent-3: #4dc9ff;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Anton', 'Archivo Black', sans-serif;
    --ui: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ui); overflow: hidden; }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    grid-template-rows: 52px 1fr 28px;
    height: 100vh;
    gap: 0;
  }

  /* Top bar */
  .topbar {
    grid-column: 1 / -1;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
  }
  .brand {
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand::before {
    content: '';
    width: 14px; height: 14px;
    background: var(--accent);
    display: inline-block;
    transform: skewX(-20deg);
  }
  .brand .sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-left: 4px;
  }
  .topbar .actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--panel-hi); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Left panel */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 18px;
  }
  .section {
    margin-bottom: 22px;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
  }
  .upload-zone {
    border: 1.5px dashed var(--line);
    padding: 28px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--text); background: var(--panel); }
  .upload-zone input { display: none; }

  .mask-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mask-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
  }
  .mask-item:hover { border-color: var(--accent); }
  .mask-item.active { border-color: var(--accent); background: var(--panel-hi); }
  .mask-swatch {
    width: 24px; height: 24px;
    background: var(--accent);
    flex-shrink: 0;
  }
  .mask-item .del {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
  }
  .mask-item .del:hover { color: var(--accent); }

  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 10px;
  }
  .mode-tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 8px;
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--line);
    cursor: pointer;
    text-transform: uppercase;
  }
  .mode-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    padding: 8px;
    background: var(--panel);
    border-left: 2px solid var(--accent-3);
  }

  /* Canvas area */
  .canvas-wrap {
    background:
      radial-gradient(circle at 50% 50%, #1a1a22 0%, var(--bg) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 30px;
  }
  .canvas-frame {
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--line);
    max-width: 100%;
    max-height: 100%;
  }
  #stage {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 160px);
    cursor: crosshair;
  }
  #stage.pan { cursor: move; }
  .canvas-empty {
    text-align: center;
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.15em;
  }
  .canvas-empty .big {
    font-family: var(--display);
    font-size: 64px;
    letter-spacing: 0.06em;
    color: var(--panel-hi);
    margin-bottom: 16px;
    line-height: 0.9;
  }

  /* Loading overlay */
  .loader {
    position: absolute;
    inset: 0;
    background: rgba(10,10,11,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }
  .loader.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader .msg {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Right panel */
  .inspector {
    background: var(--bg-2);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    padding: 18px;
  }
  .layer {
    border: 1px solid var(--line);
    margin-bottom: 8px;
    background: var(--panel);
    transition: border-color 0.15s;
  }
  .layer.selected { border-color: var(--accent); }
  .layer-header {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    gap: 8px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
  }
  .layer-header .grip {
    color: var(--text-dim);
    font-size: 10px;
  }
  .layer-header .label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .layer-header .del {
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
  }
  .layer-header .del:hover { color: var(--accent); }
  .layer-body {
    padding: 12px 10px;
    border-top: 1px solid var(--line);
    display: none;
  }
  .layer.selected .layer-body { display: block; }

  .field {
    margin-bottom: 12px;
  }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field input[type="text"], .field select, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 9px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .field textarea { resize: vertical; min-height: 44px; font-family: var(--display); font-size: 16px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field input[type="color"] {
    width: 100%; height: 32px; background: var(--bg);
    border: 1px solid var(--line); cursor: pointer;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .range-row {
    display: flex; align-items: center; gap: 10px;
  }
  .range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .range-row .val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
  }

  .mask-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .mask-chip {
    padding: 5px 9px;
    font-family: var(--mono);
    font-size: 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    cursor: pointer;
  }
  .mask-chip.active { background: var(--accent-3); color: #000; border-color: var(--accent-3); }

  .add-text-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .add-text-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Status bar */
  .status {
    grid-column: 1 / -1;
    background: var(--bg-2);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    gap: 20px;
  }
  .status .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
    margin-right: 6px;
  }
  .status .dot.ready { background: #6aff6a; }
  .status .dot.loading { background: var(--accent-2); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .status .spacer { margin-left: auto; }

  /* overlay markers on canvas for click points */
  .stage-container { position: relative; display: inline-block; }
  .click-marker {
    position: absolute;
    width: 18px; height: 18px;
    border: 2px solid var(--accent);
    background: rgba(255,77,46,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.8);
  }
  .click-marker.neg {
    border-color: var(--accent-3);
    background: rgba(77,201,255,0.4);
  }
  .click-marker.neg::after {
    content: '';
    position: absolute;
    top: 50%; left: 3px; right: 3px;
    height: 2px;
    background: #fff;
  }

  /* Candidate thumbnails */
  .cand-thumb {
    position: relative;
    aspect-ratio: 1;
    background: var(--bg);
    border: 1.5px solid var(--line);
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cand-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .cand-thumb:hover { border-color: var(--accent-2); }
  .cand-thumb.active { border-color: var(--accent); }
  .cand-thumb .badge {
    position: absolute;
    bottom: 2px; right: 2px;
    font-family: var(--mono);
    font-size: 8px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 1px 4px;
    letter-spacing: 0.05em;
  }
  .cand-thumb .size-label {
    position: absolute;
    top: 2px; left: 2px;
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.6);
    padding: 1px 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">SLEEVE <span class="sub">v0.1 / COVER MAKER</span></div>
    <div class="actions">
      <button class="btn" id="btn-reset">Reset</button>
      <button class="btn primary" id="btn-export">Export PNG</button>
    </div>
  </div>

  <!-- Left sidebar -->
  <div class="sidebar">
    <div class="section">
      <div class="section-title">1. Image</div>
      <label class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div>DROP IMAGE<br/>or click to browse</div>
      </label>
    </div>

    <div class="section">
      <div class="section-title">2. Select Object</div>
      <div class="hint" id="hint-text">
        画像をクリック → SAMが候補を3つ提示<br/>
        Shift+クリック: 範囲に追加<br/>
        Alt+クリック: 範囲から削る
      </div>

      <div id="candidate-picker" style="display:none; margin-top:12px;">
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:6px;">CANDIDATES (click to switch)</div>
        <div id="candidate-thumbs" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;"></div>
      </div>

      <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <button class="btn" id="btn-cancel-sel" disabled>Cancel</button>
        <button class="btn primary" id="btn-confirm-sel" disabled>Confirm ✓</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Saved Masks</div>
      <div class="mask-list" id="mask-list">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:4px;">No masks yet.</div>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <div class="canvas-empty" id="canvas-empty">
      <div class="big">SLEEVE</div>
      <div>UPLOAD AN IMAGE TO START</div>
    </div>
    <div class="canvas-frame" id="canvas-frame" style="display:none;">
      <div class="stage-container" id="stage-container">
        <canvas id="stage"></canvas>
      </div>
    </div>
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="msg" id="loader-msg">Loading model...</div>
    </div>
  </div>

  <!-- Right inspector -->
  <div class="inspector">
    <div class="section">
      <div class="section-title">3. Text Layers</div>
      <button class="add-text-btn" id="btn-add-text">+ Add Text Layer</button>
      <div id="layer-list" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="status">
    <span><span class="dot" id="status-dot"></span><span id="status-text">idle</span></span>
    <span id="img-info"></span>
    <span class="spacer"></span>
    <span>MODEL: slimsam-77-uniform (Xenova)</span>
  </div>
</div>

<script type="module">
import { SamModel, AutoProcessor, RawImage, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2';

env.allowLocalModels = false;
// Use WebGPU if available, fallback to WASM.
const device = (navigator.gpu) ? 'webgpu' : 'wasm';

// ======= State =======
const state = {
  image: null,            // HTMLImageElement
  imageURL: null,         // object URL
  rawImage: null,         // RawImage for SAM
  naturalW: 0, naturalH: 0,
  canvas: null,
  ctx: null,
  model: null,
  processor: null,
  // Pending selection (before confirm)
  pending: {
    active: false,
    points: [],         // [{x,y,label}] label=1 positive, 0 negative
    candidates: [],     // [{ canvas, score }] length 3
    selectedIdx: 0,
  },
  masks: [],              // { id, name, canvas (mask-size alpha mask) }
  layers: [],             // text layers
  selectedLayerId: null,
  nextMaskId: 1,
  nextLayerId: 1,
};

const el = (id) => document.getElementById(id);

// ======= UI wiring =======
const stage = el('stage');
const ctx = stage.getContext('2d');
state.canvas = stage;
state.ctx = ctx;

el('file-input').addEventListener('change', (e) => {
  const f = e.target.files[0];
  if (f) loadImage(f);
});
const uz = el('upload-zone');
uz.addEventListener('dragover', (e) => { e.preventDefault(); uz.style.borderColor = 'var(--accent)'; });
uz.addEventListener('dragleave', () => { uz.style.borderColor = ''; });
uz.addEventListener('drop', (e) => {
  e.preventDefault(); uz.style.borderColor = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});

el('btn-confirm-sel').addEventListener('click', confirmPendingMask);
el('btn-cancel-sel').addEventListener('click', cancelPendingMask);

el('btn-add-text').addEventListener('click', addTextLayer);
el('btn-reset').addEventListener('click', () => {
  if (!confirm('Reset everything?')) return;
  state.masks = []; state.layers = []; state.selectedLayerId = null;
  cancelPendingMask();
  renderMaskList(); renderLayerList(); renderCanvas();
});
el('btn-export').addEventListener('click', exportPNG);

stage.addEventListener('click', async (e) => {
  if (!state.image || !state.model) return;
  // Suppress click if it was the end of a drag
  if (justDragged) { justDragged = false; return; }
  const r = stage.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * state.naturalW;
  const y = (e.clientY - r.top) / r.height * state.naturalH;
  // Modifier keys: Shift = add (positive), Alt = subtract (negative)
  const label = e.altKey ? 0 : 1;

  if (!state.pending.active || (!e.shiftKey && !e.altKey)) {
    // New selection
    state.pending.active = true;
    state.pending.points = [{ x, y, label: 1 }];
  } else {
    // Add/subtract to current pending
    state.pending.points.push({ x, y, label });
  }
  await runSAM();
});

// ======= Image loading =======
async function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.src = url;
  await img.decode();
  state.image = img;
  state.imageURL = url;
  state.naturalW = img.naturalWidth;
  state.naturalH = img.naturalHeight;

  // Fit canvas to display area
  stage.width = state.naturalW;
  stage.height = state.naturalH;

  el('canvas-empty').style.display = 'none';
  el('canvas-frame').style.display = 'block';
  el('img-info').textContent = `${state.naturalW} × ${state.naturalH}`;

  renderCanvas();

  // Load SAM model (cached after first load) and prepare RawImage
  await ensureModel();
  showLoader('Preparing image...');
  setStatus('loading', 'preparing image');
  state.rawImage = await RawImage.fromURL(state.imageURL);
  hideLoader();
  setStatus('ready', 'ready · click on the image');
}

// ======= SAM model =======
async function ensureModel() {
  if (state.model) return;
  showLoader('Loading SAM model (first time only, ~80MB)...');
  setStatus('loading', 'loading model');
  const modelId = 'Xenova/slimsam-77-uniform';
  try {
    state.model = await SamModel.from_pretrained(modelId, {
      dtype: 'fp16',
      device,
    });
  } catch (err) {
    console.warn('fp16/webgpu failed, retrying default:', err);
    state.model = await SamModel.from_pretrained(modelId);
  }
  state.processor = await AutoProcessor.from_pretrained(modelId);
  hideLoader();
}

async function runSAM() {
  if (!state.model || !state.rawImage) return;
  const pts = state.pending.points;
  if (pts.length === 0) return;

  showLoader('Segmenting...');
  setStatus('loading', 'segmenting');

  try {
    const input_points = [[ pts.map(p => [p.x, p.y]) ]];
    const input_labels = [[ pts.map(p => p.label) ]];

    const inputs = await state.processor(state.rawImage, { input_points, input_labels });
    const outputs = await state.model(inputs);

    const masks = await state.processor.post_process_masks(
      outputs.pred_masks,
      inputs.original_sizes,
      inputs.reshaped_input_sizes,
    );

    const scores = outputs.iou_scores.data;
    const maskTensor = masks[0];
    const dims = maskTensor.dims;
    const H = dims[dims.length - 2];
    const W = dims[dims.length - 1];
    const maskData = maskTensor.data;
    const perMask = H * W;
    const numMasks = scores.length;

    // Build candidate canvases, each at natural image resolution
    const candidates = [];
    for (let k = 0; k < numMasks; k++) {
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const cctx = c.getContext('2d');
      const imgData = cctx.createImageData(W, H);
      const offset = k * perMask;
      let area = 0;
      for (let i = 0; i < perMask; i++) {
        const v = maskData[offset + i] ? 255 : 0;
        imgData.data[i*4+0] = 255;
        imgData.data[i*4+1] = 255;
        imgData.data[i*4+2] = 255;
        imgData.data[i*4+3] = v;
        if (v) area++;
      }
      cctx.putImageData(imgData, 0, 0);
      candidates.push({ canvas: c, score: scores[k], area });
    }

    // Sort candidates by area ascending (small/medium/large)
    candidates.sort((a, b) => a.area - b.area);

    state.pending.candidates = candidates;
    // Keep current selection if possible, otherwise default to largest (全体)
    if (state.pending.selectedIdx == null || state.pending.selectedIdx >= candidates.length) {
      state.pending.selectedIdx = candidates.length - 1; // largest by default
    }

    renderCandidatePicker();
    renderOverlay();
    renderCanvas();
    el('btn-confirm-sel').disabled = false;
    el('btn-cancel-sel').disabled = false;
    setStatus('ready', `${pts.length} point(s) · choose candidate`);
  } catch (err) {
    console.error(err);
    alert('Segmentation failed: ' + err.message);
    setStatus('ready', 'error');
  } finally {
    hideLoader();
  }
}

function renderCandidatePicker() {
  const picker = el('candidate-picker');
  const thumbs = el('candidate-thumbs');
  if (!state.pending.active || state.pending.candidates.length === 0) {
    picker.style.display = 'none';
    return;
  }
  picker.style.display = 'block';
  thumbs.innerHTML = '';
  const labels = ['S', 'M', 'L']; // small / medium / large
  state.pending.candidates.forEach((cand, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'cand-thumb' + (idx === state.pending.selectedIdx ? ' active' : '');

    // Compose thumbnail: image with mask tint overlay
    const tw = 120, th = 120;
    const tc = document.createElement('canvas');
    tc.width = tw; tc.height = th;
    const tctx = tc.getContext('2d');
    // Draw image scaled
    const scale = Math.max(tw / state.naturalW, th / state.naturalH);
    const sw = state.naturalW * scale;
    const sh = state.naturalH * scale;
    tctx.drawImage(state.image, (tw - sw)/2, (th - sh)/2, sw, sh);
    // Overlay mask in accent color
    const overlay = document.createElement('canvas');
    overlay.width = tw; overlay.height = th;
    const octx = overlay.getContext('2d');
    octx.drawImage(cand.canvas, (tw - sw)/2, (th - sh)/2, sw, sh);
    octx.globalCompositeOperation = 'source-in';
    octx.fillStyle = 'rgba(255, 77, 46, 0.75)';
    octx.fillRect(0, 0, tw, th);
    tctx.drawImage(overlay, 0, 0);

    thumb.appendChild(tc);
    thumb.innerHTML += `
      <div class="size-label">${labels[idx] || idx+1}</div>
      <div class="badge">${(cand.score * 100).toFixed(0)}%</div>
    `;
    thumb.addEventListener('click', () => {
      state.pending.selectedIdx = idx;
      renderCandidatePicker();
      renderCanvas();
    });
    thumbs.appendChild(thumb);
  });
}

function confirmPendingMask() {
  if (!state.pending.active || state.pending.candidates.length === 0) return;
  const chosen = state.pending.candidates[state.pending.selectedIdx];
  const id = state.nextMaskId++;
  state.masks.push({
    id,
    name: `Mask ${id}`,
    canvas: chosen.canvas,
    score: chosen.score,
  });
  cancelPendingMask();
  renderMaskList();
  renderLayerList();
  renderCanvas();
}

function cancelPendingMask() {
  state.pending.active = false;
  state.pending.points = [];
  state.pending.candidates = [];
  state.pending.selectedIdx = 0;
  el('btn-confirm-sel').disabled = true;
  el('btn-cancel-sel').disabled = true;
  renderCandidatePicker();
  renderOverlay();
  renderCanvas();
  setStatus('ready', 'ready · click on the image');
}

// ======= Text layers =======
function addTextLayer() {
  if (!state.image) { alert('Upload an image first.'); return; }
  const id = state.nextLayerId++;
  const layer = {
    id,
    text: 'YOUR TEXT',
    font: 'Anton',
    size: Math.round(state.naturalH * 0.28),
    color: '#ff4d2e',
    x: state.naturalW / 2,
    y: state.naturalH / 2,
    opacity: 1,
    blur: 0,
    letterSpacing: 0,
    maskId: null,    // which mask this text relates to
    maskMode: 'none' // 'none' | 'behind' | 'infront'
  };
  state.layers.push(layer);
  state.selectedLayerId = id;
  renderLayerList();
  renderCanvas();
}

function deleteLayer(id) {
  state.layers = state.layers.filter(l => l.id !== id);
  if (state.selectedLayerId === id) state.selectedLayerId = null;
  renderLayerList();
  renderCanvas();
}

function renderLayerList() {
  const list = el('layer-list');
  list.innerHTML = '';
  if (state.layers.length === 0) {
    list.innerHTML = '<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:6px;">No text layers yet.</div>';
    return;
  }
  // Render in reverse so topmost shows first
  [...state.layers].reverse().forEach((layer) => {
    const div = document.createElement('div');
    div.className = 'layer' + (state.selectedLayerId === layer.id ? ' selected' : '');
    div.innerHTML = `
      <div class="layer-header" data-id="${layer.id}">
        <span class="grip">≡</span>
        <span class="label">${escapeHtml(layer.text) || '(empty)'}</span>
        <span class="del" data-del="${layer.id}">×</span>
      </div>
      <div class="layer-body">
        <div class="field">
          <label>Text</label>
          <textarea data-prop="text" data-id="${layer.id}">${escapeHtml(layer.text)}</textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Font</label>
            <select data-prop="font" data-id="${layer.id}">
              <option ${layer.font==='Anton'?'selected':''}>Anton</option>
              <option ${layer.font==='Bebas Neue'?'selected':''}>Bebas Neue</option>
              <option ${layer.font==='Archivo Black'?'selected':''}>Archivo Black</option>
              <option ${layer.font==='Syne'?'selected':''}>Syne</option>
              <option ${layer.font==='JetBrains Mono'?'selected':''}>JetBrains Mono</option>
            </select>
          </div>
          <div class="field">
            <label>Color</label>
            <input type="color" data-prop="color" data-id="${layer.id}" value="${layer.color}">
          </div>
        </div>
        <div class="field">
          <label>Size <span style="float:right;color:var(--text)">${layer.size}px</span></label>
          <div class="range-row">
            <input type="range" min="20" max="${Math.round(state.naturalH)}" value="${layer.size}" data-prop="size" data-id="${layer.id}">
          </div>
        </div>
        <div class="field">
          <label>Letter Spacing <span style="float:right;color:var(--text)">${layer.letterSpacing}</span></label>
          <div class="range-row">
            <input type="range" min="-20" max="60" value="${layer.letterSpacing}" data-prop="letterSpacing" data-id="${layer.id}">
          </div>
        </div>
        <div class="field">
          <label>Opacity <span style="float:right;color:var(--text)">${Math.round(layer.opacity*100)}%</span></label>
          <div class="range-row">
            <input type="range" min="0" max="100" value="${Math.round(layer.opacity*100)}" data-prop="opacity" data-id="${layer.id}">
          </div>
        </div>
        <div class="field">
          <label>Blur <span style="float:right;color:var(--text)">${layer.blur}px</span></label>
          <div class="range-row">
            <input type="range" min="0" max="30" value="${layer.blur}" data-prop="blur" data-id="${layer.id}">
          </div>
        </div>
        <div class="field">
          <label>Depth (relative to mask)</label>
          <div class="mask-picker">
            <div class="mask-chip ${layer.maskMode==='none'?'active':''}" data-maskmode="none" data-id="${layer.id}">— none</div>
            ${state.masks.map(m => `
              <div class="mask-chip ${layer.maskMode==='behind' && layer.maskId===m.id?'active':''}"
                   data-maskmode="behind" data-maskid="${m.id}" data-id="${layer.id}">
                ◯ behind ${escapeHtml(m.name)}
              </div>
              <div class="mask-chip ${layer.maskMode==='infront' && layer.maskId===m.id?'active':''}"
                   data-maskmode="infront" data-maskid="${m.id}" data-id="${layer.id}">
                ● front ${escapeHtml(m.name)}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="hint" style="margin-top:8px;">
          Drag on canvas to move this text.
        </div>
      </div>
    `;
    list.appendChild(div);
  });

  // Wire events
  list.querySelectorAll('.layer-header').forEach(h => {
    h.addEventListener('click', (e) => {
      if (e.target.dataset.del) return;
      const id = parseInt(h.dataset.id);
      state.selectedLayerId = state.selectedLayerId === id ? null : id;
      renderLayerList();
    });
  });
  list.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteLayer(parseInt(btn.dataset.del));
    });
  });
  list.querySelectorAll('[data-prop]').forEach(input => {
    input.addEventListener('input', (e) => {
      const id = parseInt(input.dataset.id);
      const prop = input.dataset.prop;
      const layer = state.layers.find(l => l.id === id);
      if (!layer) return;
      let v = input.value;
      if (['size','letterSpacing','blur'].includes(prop)) v = parseInt(v);
      else if (prop === 'opacity') v = parseInt(v) / 100;
      layer[prop] = v;
      // Keep label in sync without full re-render for text input
      if (prop === 'text') {
        const labelEl = input.closest('.layer').querySelector('.label');
        if (labelEl) labelEl.textContent = v || '(empty)';
      }
      // Update numeric display labels
      if (['size','letterSpacing','opacity','blur'].includes(prop)) {
        const labelText = input.closest('.field').querySelector('label');
        if (prop === 'size') labelText.innerHTML = `Size <span style="float:right;color:var(--text)">${layer.size}px</span>`;
        if (prop === 'letterSpacing') labelText.innerHTML = `Letter Spacing <span style="float:right;color:var(--text)">${layer.letterSpacing}</span>`;
        if (prop === 'opacity') labelText.innerHTML = `Opacity <span style="float:right;color:var(--text)">${Math.round(layer.opacity*100)}%</span>`;
        if (prop === 'blur') labelText.innerHTML = `Blur <span style="float:right;color:var(--text)">${layer.blur}px</span>`;
      }
      renderCanvas();
    });
  });
  list.querySelectorAll('.mask-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = parseInt(chip.dataset.id);
      const layer = state.layers.find(l => l.id === id);
      if (!layer) return;
      const mode = chip.dataset.maskmode;
      if (mode === 'none') {
        layer.maskMode = 'none';
        layer.maskId = null;
      } else {
        layer.maskMode = mode;
        layer.maskId = parseInt(chip.dataset.maskid);
      }
      renderLayerList();
      renderCanvas();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ======= Canvas rendering =======
function renderCanvas() {
  if (!state.image) return;
  const W = state.naturalW, H = state.naturalH;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(state.image, 0, 0, W, H);

  // Determine rendering order:
  // For each text layer with maskMode === 'behind', we draw text then mask-covered foreground on top.
  // For 'infront', we draw text directly on top of the image.
  // For 'none', draw on top.
  // Multiple layers: draw in order of creation (layers[0] is bottom).
  for (const layer of state.layers) {
    renderText(layer);
    if (layer.maskMode === 'behind' && layer.maskId != null) {
      const mask = state.masks.find(m => m.id === layer.maskId);
      if (mask) {
        // Create a "foreground" cutout: image with mask alpha
        const fg = document.createElement('canvas');
        fg.width = W; fg.height = H;
        const fctx = fg.getContext('2d');
        fctx.drawImage(mask.canvas, 0, 0, W, H);
        fctx.globalCompositeOperation = 'source-in';
        fctx.drawImage(state.image, 0, 0, W, H);
        ctx.drawImage(fg, 0, 0);
      }
    }
  }

  // Pending selection overlay (shown on top of everything to indicate current selection)
  if (state.pending.active && state.pending.candidates.length > 0) {
    const cand = state.pending.candidates[state.pending.selectedIdx];
    if (cand) {
      // Tint: draw a red mask overlay
      const overlay = document.createElement('canvas');
      overlay.width = W; overlay.height = H;
      const octx = overlay.getContext('2d');
      octx.drawImage(cand.canvas, 0, 0, W, H);
      octx.globalCompositeOperation = 'source-in';
      octx.fillStyle = 'rgba(255, 77, 46, 0.45)';
      octx.fillRect(0, 0, W, H);
      ctx.drawImage(overlay, 0, 0);

      // Also draw a solid outline around the mask
      drawMaskOutline(ctx, cand.canvas, W, H);
    }
  }
}

function drawMaskOutline(dstCtx, maskCanvas, W, H) {
  // Simple outline: scale mask then stroke its "edge" via composite tricks.
  // We approximate by drawing the mask's alpha edge as an offset diff.
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(maskCanvas, 0, 0, W, H);
  tctx.globalCompositeOperation = 'source-in';
  tctx.fillStyle = 'rgba(255,255,255,1)';
  tctx.fillRect(0, 0, W, H);

  // Draw 4 offset copies minus center to get outline
  const outline = document.createElement('canvas');
  outline.width = W; outline.height = H;
  const octx = outline.getContext('2d');
  const o = Math.max(2, Math.round(Math.min(W, H) * 0.003));
  [[-o,0],[o,0],[0,-o],[0,o]].forEach(([dx,dy]) => {
    octx.drawImage(tmp, dx, dy);
  });
  octx.globalCompositeOperation = 'destination-out';
  octx.drawImage(tmp, 0, 0);
  octx.globalCompositeOperation = 'source-in';
  octx.fillStyle = 'rgba(255, 77, 46, 1)';
  octx.fillRect(0, 0, W, H);

  dstCtx.drawImage(outline, 0, 0);
}

function renderText(layer) {
  const W = state.naturalW, H = state.naturalH;
  ctx.save();
  ctx.globalAlpha = layer.opacity;
  if (layer.blur > 0) {
    ctx.filter = `blur(${layer.blur}px)`;
  }
  ctx.fillStyle = layer.color;
  ctx.font = `${layer.size}px "${layer.font}", sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  // letterSpacing is not directly supported in Canvas 2D widely; emulate if non-zero
  const ls = layer.letterSpacing || 0;
  const lines = (layer.text || '').split('\n');
  const lineHeight = layer.size * 1.05;
  const startY = layer.y - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((line, i) => {
    const y = startY + i * lineHeight;
    if (ls === 0) {
      ctx.fillText(line, layer.x, y);
    } else {
      // Manual letter-spaced drawing
      const chars = [...line];
      const widths = chars.map(c => ctx.measureText(c).width);
      const total = widths.reduce((a,b)=>a+b, 0) + ls * (chars.length - 1);
      let cx = layer.x - total / 2;
      for (let k = 0; k < chars.length; k++) {
        ctx.textAlign = 'left';
        ctx.fillText(chars[k], cx, y);
        cx += widths[k] + ls;
      }
      ctx.textAlign = 'center';
    }
  });
  ctx.restore();
}

// ======= Dragging text on canvas =======
let dragging = null; // {layerId, dx, dy, moved}
let justDragged = false;
stage.addEventListener('mousedown', (e) => {
  if (!state.image) return;
  if (state.pending.active) return; // selection in progress
  if (state.selectedLayerId == null) return;
  const layer = state.layers.find(l => l.id === state.selectedLayerId);
  if (!layer) return;
  const r = stage.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * state.naturalW;
  const y = (e.clientY - r.top) / r.height * state.naturalH;
  // Simple hit test: within some radius of layer center (approx bounding box)
  ctx.save();
  ctx.font = `${layer.size}px "${layer.font}", sans-serif`;
  const textW = ctx.measureText(layer.text.split('\n')[0] || '').width;
  const lines = (layer.text || '').split('\n');
  const textH = layer.size * lines.length;
  ctx.restore();
  if (Math.abs(x - layer.x) < textW / 2 + 30 && Math.abs(y - layer.y) < textH / 2 + 30) {
    dragging = { layerId: layer.id, dx: layer.x - x, dy: layer.y - y, moved: false };
    e.preventDefault();
    e.stopPropagation();
  }
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const r = stage.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * state.naturalW;
  const y = (e.clientY - r.top) / r.height * state.naturalH;
  const layer = state.layers.find(l => l.id === dragging.layerId);
  if (!layer) return;
  layer.x = x + dragging.dx;
  layer.y = y + dragging.dy;
  dragging.moved = true;
  renderCanvas();
});
window.addEventListener('mouseup', () => {
  if (dragging && dragging.moved) justDragged = true;
  dragging = null;
});

// ======= Mask list rendering =======
function renderMaskList() {
  const list = el('mask-list');
  list.innerHTML = '';
  if (state.masks.length === 0) {
    list.innerHTML = '<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:4px;">No masks yet.</div>';
    return;
  }
  state.masks.forEach(mask => {
    const div = document.createElement('div');
    div.className = 'mask-item';
    div.innerHTML = `
      <div class="mask-swatch"></div>
      <span>${escapeHtml(mask.name)} · ${(mask.score * 100).toFixed(0)}%</span>
      <span class="del" data-del="${mask.id}">×</span>
    `;
    div.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      state.masks = state.masks.filter(m => m.id !== mask.id);
      // Unlink from layers
      state.layers.forEach(l => {
        if (l.maskId === mask.id) { l.maskId = null; l.maskMode = 'none'; }
      });
      renderMaskList();
      renderLayerList();
      renderCanvas();
    });
    list.appendChild(div);
  });
}

// ======= Click point overlay =======
function renderOverlay() {
  document.querySelectorAll('.click-marker').forEach(m => m.remove());
  if (!state.pending.active) return;
  const container = el('stage-container');
  const r = stage.getBoundingClientRect();
  state.pending.points.forEach(p => {
    const m = document.createElement('div');
    m.className = 'click-marker' + (p.label === 0 ? ' neg' : '');
    m.style.left = (p.x / state.naturalW * r.width) + 'px';
    m.style.top = (p.y / state.naturalH * r.height) + 'px';
    container.appendChild(m);
  });
}

// ======= Export =======
function exportPNG() {
  if (!state.image) return;
  const link = document.createElement('a');
  link.download = `sleeve_${Date.now()}.png`;
  link.href = stage.toDataURL('image/png');
  link.click();
}

// ======= Helpers =======
function showLoader(msg) {
  el('loader').classList.add('show');
  el('loader-msg').textContent = msg;
}
function hideLoader() {
  el('loader').classList.remove('show');
}
function setStatus(cls, text) {
  const dot = el('status-dot');
  dot.className = 'dot ' + cls;
  el('status-text').textContent = text;
}

setStatus('', 'idle · upload an image');
</script>
</body>
</html>
